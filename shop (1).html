<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#020510">
<title>⚡ DIAMOND SHOP</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
:root {
  --bg:#020510; --cyan:#00f5ff; --cyan-glow:rgba(0,245,255,0.5);
  --pink:#ff00aa; --pink-glow:rgba(255,0,170,0.45);
  --yellow:#ffe566; --purple:#b400ff; --green:#00ff88;
  --text:#e8f4ff; --text2:rgba(232,244,255,0.5); --text3:rgba(232,244,255,0.25);
  --border:rgba(0,245,255,0.18);
}
html, body { height:100%; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--text); overflow-x:hidden; max-width:480px; margin:0 auto; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:9999; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px); }
#grid-bg { position:fixed; inset:0; z-index:0; pointer-events:none; background-image:linear-gradient(rgba(0,245,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.04) 1px,transparent 1px); background-size:44px 44px; animation:gridDrift 18s linear infinite; }
@keyframes gridDrift { from{background-position:0 0} to{background-position:44px 44px} }
#glow-tl { position:fixed; top:-120px; left:-120px; width:360px; height:360px; border-radius:50%; background:radial-gradient(circle,rgba(0,245,255,0.12) 0%,transparent 70%); pointer-events:none; z-index:0; animation:glowPulse 5s ease-in-out infinite alternate; }
#glow-br { position:fixed; bottom:-120px; right:-120px; width:360px; height:360px; border-radius:50%; background:radial-gradient(circle,rgba(255,0,170,0.1) 0%,transparent 70%); pointer-events:none; z-index:0; animation:glowPulse 7s ease-in-out infinite alternate-reverse; }
@keyframes glowPulse { 0%{opacity:0.6;transform:scale(0.9)} 100%{opacity:1;transform:scale(1.1)} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.header { position:relative; z-index:10; padding:18px 18px 0; padding-top:calc(18px + env(safe-area-inset-top,0px)); }
.header-inner { display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); padding-bottom:14px; }
.logo { font-family:'Orbitron',monospace; font-size:20px; font-weight:900; background:linear-gradient(90deg,var(--cyan),var(--pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; filter:drop-shadow(0 0 12px rgba(0,245,255,0.5)); letter-spacing:2px; }
.logo-sub { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text3); letter-spacing:3px; text-transform:uppercase; margin-top:2px; }
.status-dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 10px var(--green),0 0 20px var(--green); animation:blink 1.8s ease-in-out infinite; }
.tabs { position:relative; z-index:10; display:flex; padding:0 18px; border-bottom:1px solid rgba(0,245,255,0.1); }
.tab-btn { flex:1; padding:12px 8px; background:none; border:none; cursor:pointer; font-family:'Orbitron',monospace; font-size:10px; font-weight:700; color:var(--text3); letter-spacing:1.5px; text-transform:uppercase; position:relative; transition:color 0.2s; }
.tab-btn::after { content:''; position:absolute; bottom:-1px; left:20%; right:20%; height:2px; background:var(--cyan); border-radius:2px 2px 0 0; opacity:0; transition:opacity 0.2s; box-shadow:0 0 10px var(--cyan-glow); }
.tab-btn.active { color:var(--cyan); text-shadow:0 0 12px var(--cyan-glow); }
.tab-btn.active::after { opacity:1; left:10%; right:10%; }
.tab-btn.pink-tab.active { color:var(--pink); text-shadow:0 0 12px var(--pink-glow); }
.tab-btn.pink-tab.active::after { background:var(--pink); box-shadow:0 0 10px var(--pink-glow); }
.content { position:relative; z-index:10; overflow-y:auto; padding:16px 18px 100px; height:calc(100vh - 130px); -webkit-overflow-scrolling:touch; }
.content::-webkit-scrollbar { width:3px; }
.content::-webkit-scrollbar-thumb { background:rgba(0,245,255,0.3); border-radius:2px; }
.sect-head { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--text3); text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; gap:10px; }
.sect-head::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }
.card { position:relative; overflow:hidden; border-radius:16px; margin-bottom:12px; background:linear-gradient(135deg,rgba(6,13,30,0.97),rgba(2,5,16,0.97)); border:1px solid rgba(0,245,255,0.14); cursor:pointer; transition:transform 0.12s cubic-bezier(0.34,1.5,0.64,1),border-color 0.2s,box-shadow 0.2s; user-select:none; }
.card:active { transform:scale(0.96) translateY(2px); filter:brightness(0.85); }
.card:hover { border-color:rgba(0,245,255,0.4); box-shadow:0 0 24px rgba(0,245,255,0.1); }
.card::before { content:''; position:absolute; top:-100%; left:0; right:0; height:40%; background:linear-gradient(180deg,transparent,rgba(0,245,255,0.06),transparent); animation:scanCard 4s ease-in-out infinite; pointer-events:none; z-index:0; }
@keyframes scanCard { 0%{top:-40%} 100%{top:140%} }
.card.pink-card { border-color:rgba(255,0,170,0.14); }
.card.pink-card:hover { border-color:rgba(255,0,170,0.4); box-shadow:0 0 24px rgba(255,0,170,0.1); }
.card.pink-card::before { background:linear-gradient(180deg,transparent,rgba(255,0,170,0.06),transparent); }
.card.hot { border-color:rgba(255,229,102,0.35); }
.card.hot:hover { border-color:rgba(255,229,102,0.7); box-shadow:0 0 28px rgba(255,229,102,0.15); }
.card-inner { position:relative; z-index:1; display:flex; align-items:center; padding:14px 16px; gap:14px; }
.card-bar { width:3px; height:44px; border-radius:2px; flex-shrink:0; }
.card-bar.cyan { background:linear-gradient(180deg,var(--cyan),rgba(0,245,255,0)); box-shadow:0 0 10px var(--cyan); }
.card-bar.pink { background:linear-gradient(180deg,var(--pink),rgba(255,0,170,0)); box-shadow:0 0 10px var(--pink); }
.card-bar.yellow { background:linear-gradient(180deg,var(--yellow),rgba(255,229,102,0)); box-shadow:0 0 10px rgba(255,229,102,0.8); }
.card-bar.purple { background:linear-gradient(180deg,var(--purple),rgba(180,0,255,0)); box-shadow:0 0 10px var(--purple); }
.card-icon { font-size:28px; flex-shrink:0; line-height:1; }
.card-info { flex:1; min-width:0; }
.card-title { font-family:'Orbitron',monospace; font-size:12px; font-weight:700; color:var(--text); letter-spacing:0.5px; }
.card-sub { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text2); margin-top:3px; }
.card-amount { font-family:'Orbitron',monospace; font-size:13px; font-weight:900; text-align:right; flex-shrink:0; }
.card-amount .give { display:block; font-size:10px; color:var(--text3); font-weight:400; margin-bottom:2px; font-family:'Share Tech Mono',monospace; letter-spacing:1px; }
.badge { position:absolute; top:10px; right:10px; font-family:'Orbitron',monospace; font-size:8px; font-weight:700; letter-spacing:1.5px; padding:3px 8px; border-radius:4px; text-transform:uppercase; }
.badge-hot { background:rgba(255,229,102,0.15); border:1px solid rgba(255,229,102,0.5); color:var(--yellow); }
.badge-best { background:rgba(0,255,136,0.12); border:1px solid rgba(0,255,136,0.4); color:var(--green); }
.badge-sale { background:rgba(255,0,170,0.12); border:1px solid rgba(255,0,170,0.4); color:var(--pink); }

/* CONFIRM OVERLAY */
#confirm-overlay { position:fixed; inset:0; z-index:9000; background:rgba(0,0,0,0.88); backdrop-filter:blur(18px); display:flex; align-items:flex-end; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity 0.22s; }
#confirm-overlay.active { opacity:1; pointer-events:all; }
.confirm-box { background:linear-gradient(160deg,rgba(6,13,30,0.99),rgba(2,5,16,0.99)); border:1px solid var(--border); border-radius:24px 24px 20px 20px; width:100%; max-width:440px; padding:26px 22px 28px; transform:translateY(40px); transition:transform 0.28s cubic-bezier(0.34,1.2,0.64,1); position:relative; overflow:hidden; }
.confirm-box::before { content:''; position:absolute; top:0; left:20%; right:20%; height:1px; background:linear-gradient(90deg,transparent,var(--cyan),transparent); }
#confirm-overlay.active .confirm-box { transform:translateY(0); }
.confirm-title { font-family:'Orbitron',monospace; font-size:15px; font-weight:900; color:var(--cyan); text-shadow:0 0 16px var(--cyan-glow); text-align:center; margin-bottom:4px; letter-spacing:1px; }
.confirm-sub { text-align:center; font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text3); letter-spacing:2px; margin-bottom:16px; }
.confirm-item-info { background:rgba(0,245,255,0.04); border:1px solid rgba(0,245,255,0.12); border-radius:12px; padding:12px 16px; margin-bottom:16px; text-align:center; }
.confirm-item-name { font-family:'Orbitron',monospace; font-size:13px; font-weight:900; color:var(--cyan); margin-bottom:4px; }
.confirm-item-give { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text2); }
.receipt-label { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text3); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
.receipt-area { width:100%; min-height:90px; background:rgba(0,245,255,0.03); border:1px solid rgba(0,245,255,0.2); border-radius:12px; color:var(--text); font-family:'Share Tech Mono',monospace; font-size:11px; padding:12px; resize:vertical; outline:none; transition:border-color 0.2s; margin-bottom:16px; line-height:1.6; }
.receipt-area:focus { border-color:rgba(0,245,255,0.5); box-shadow:0 0 12px rgba(0,245,255,0.1); }
.receipt-area::placeholder { color:var(--text3); }
.receipt-area.pink-area { border-color:rgba(255,0,170,0.2); }
.receipt-area.pink-area:focus { border-color:rgba(255,0,170,0.5); box-shadow:0 0 12px rgba(255,0,170,0.1); }
.confirm-btns { display:flex; gap:10px; }
.btn-cancel { flex:1; padding:13px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:var(--text2); font-family:'Orbitron',monospace; font-size:11px; font-weight:700; cursor:pointer; letter-spacing:1px; }
.btn-cancel:active { transform:scale(0.97); }
.btn-confirm { flex:2; padding:13px; background:linear-gradient(135deg,rgba(0,245,255,0.18),rgba(0,180,255,0.08)); border:1.5px solid var(--cyan); border-radius:12px; color:var(--cyan); font-family:'Orbitron',monospace; font-size:12px; font-weight:900; cursor:pointer; letter-spacing:1.5px; box-shadow:0 0 20px rgba(0,245,255,0.25); text-shadow:0 0 10px var(--cyan-glow); transition:all 0.15s; }
.btn-confirm.pink-btn { background:linear-gradient(135deg,rgba(255,0,170,0.18),rgba(255,0,120,0.08)); border-color:var(--pink); color:var(--pink); box-shadow:0 0 20px rgba(255,0,170,0.25); text-shadow:0 0 10px var(--pink-glow); }
.btn-confirm:active { transform:scale(0.97); }
.btn-confirm:disabled { opacity:0.5; cursor:not-allowed; }
#toast { position:fixed; top:24px; left:50%; transform:translateX(-50%) translateY(-80px); z-index:99999; min-width:220px; max-width:340px; background:linear-gradient(135deg,rgba(6,13,30,0.99),rgba(2,5,16,0.99)); border:1px solid var(--cyan); border-radius:12px; padding:12px 20px; text-align:center; font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--cyan); box-shadow:0 0 30px rgba(0,245,255,0.3); transition:transform 0.35s cubic-bezier(0.34,1.4,0.64,1),opacity 0.25s; opacity:0; pointer-events:none; }
#toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
#toast.err { border-color:var(--pink); color:var(--pink); box-shadow:0 0 30px rgba(255,0,170,0.3); }
.success-flash { position:fixed; inset:0; z-index:99000; pointer-events:none; background:rgba(0,245,255,0.07); animation:flash 0.5s ease-out forwards; }
.success-flash.pink { background:rgba(255,0,170,0.07); }
@keyframes flash { 0%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>
<div id="grid-bg"></div>
<div id="glow-tl"></div>
<div id="glow-br"></div>

<div class="header">
  <div class="header-inner">
    <div>
      <div class="logo">◈ DIAMOND SHOP</div>
      <div class="logo-sub">// ОПЛАТА ЧЕКОМ</div>
    </div>
    <div class="status-dot"></div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('gems')" id="tab-gems">💎 Алмазы</button>
  <button class="tab-btn pink-tab" onclick="switchTab('energy')" id="tab-energy">⚡ Энергия</button>
</div>

<div class="content" id="content-area"></div>

<div id="confirm-overlay">
  <div class="confirm-box" id="confirm-box-inner">
    <div class="confirm-title" id="c-title">◈ ОПЛАТА ЧЕКОМ</div>
    <div class="confirm-sub">// ВСТАВЬТЕ ЧЕК ДЛЯ ПОДТВЕРЖДЕНИЯ</div>
    <div class="confirm-item-info">
      <div class="confirm-item-name" id="c-item-name">—</div>
      <div class="confirm-item-give" id="c-item-give">—</div>
    </div>
    <div class="receipt-label">// ЧЕК (текст):</div>
    <textarea class="receipt-area" id="receipt-input" placeholder="Вставьте текст чека здесь..."></textarea>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">ОТМЕНА</button>
      <button class="btn-confirm" id="btn-do-confirm" onclick="doConfirm()">ОТПРАВИТЬ ЧЕК</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const TG_TOKEN = '8936373431:AAFo88hGVC9R99qTJTnDrKrfJUc4zFb4rJo';
const TG_CHAT  = '7962855303';

const GEMS_CATALOG = [
  { id:'g1', prgram:1000,  gems:800,   bar:'cyan',   badge:null,   label:'STARTER' },
  { id:'g2', prgram:1750,  gems:1500,  bar:'cyan',   badge:'hot',  label:'POPULAR' },
  { id:'g3', prgram:3000,  gems:3500,  bar:'yellow', badge:'best', label:'BEST VALUE' },
  { id:'g4', prgram:4000,  gems:5000,  bar:'purple', badge:null,   label:'PRO' },
  { id:'g5', prgram:5600,  gems:7000,  bar:'pink',   badge:'sale', label:'ELITE' },
  { id:'g6', prgram:8000,  gems:10000, bar:'yellow', badge:'best', label:'LEGENDARY' },
];
const ENERGY_CATALOG = GEMS_CATALOG.map(g => ({ ...g, id:'e'+g.id, energy: g.gems * 2 }));

let currentTab = 'gems';
let pendingItem = null;

function fmtNum(n) { return Math.floor(n||0).toLocaleString('ru-RU'); }

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-gems').classList.toggle('active', tab==='gems');
  document.getElementById('tab-energy').classList.toggle('active', tab==='energy');
  renderContent();
}

function renderContent() {
  const area = document.getElementById('content-area');
  const isGems = currentTab === 'gems';
  const catalog = isGems ? GEMS_CATALOG : ENERGY_CATALOG;
  const icon = isGems ? '💎' : '⚡';
  const accentCl = isGems ? 'cyan' : 'pink';
  const heading = isGems ? '// АЛМАЗЫ — оплата чеком' : '// ЭНЕРГИЯ — оплата чеком';

  let html = `<div class="sect-head">${heading}</div>`;
  catalog.forEach(item => {
    const give = isGems ? item.gems : item.energy;
    const pinkCls = !isGems ? ' pink-card' : '';
    const hotCls  = item.badge === 'hot' ? ' hot' : '';
    let badgeHtml = '';
    if (item.badge === 'hot')  badgeHtml = '<span class="badge badge-hot">HOT 🔥</span>';
    if (item.badge === 'best') badgeHtml = '<span class="badge badge-best">BEST ✦</span>';
    if (item.badge === 'sale') badgeHtml = '<span class="badge badge-sale">ELITE ◈</span>';
    html += `
    <div class="card${hotCls}${pinkCls}" onclick="openConfirm('${item.id}')">
      ${badgeHtml}
      <div class="card-inner">
        <div class="card-bar ${item.bar}"></div>
        <div class="card-icon">${icon}</div>
        <div class="card-info">
          <div class="card-title">${item.label}</div>
          <div class="card-sub">СТОИМОСТЬ: ${fmtNum(item.prgram)} PRGRAM</div>
        </div>
        <div class="card-amount" style="color:${accentCl==='cyan'?'var(--cyan)':'var(--pink)'};text-shadow:0 0 14px ${accentCl==='cyan'?'var(--cyan-glow)':'var(--pink-glow)'};">
          <span class="give">ПОЛУЧИШЬ</span>${fmtNum(give)} ${icon}
        </div>
      </div>
    </div>`;
  });
  area.innerHTML = html;
}

function openConfirm(itemId) {
  const isGems = currentTab === 'gems';
  const catalog = isGems ? GEMS_CATALOG : ENERGY_CATALOG;
  const item = catalog.find(i => i.id === itemId);
  if (!item) return;
  pendingItem = item;
  const isPink = !isGems;
  const give = isGems ? item.gems : item.energy;
  const icon = isGems ? '💎' : '⚡';

  document.getElementById('c-title').textContent = isPink ? '◈ ПОКУПКА ЭНЕРГИИ' : '◈ ПОКУПКА АЛМАЗОВ';
  document.getElementById('c-item-name').textContent = item.label;
  document.getElementById('c-item-name').style.color = isPink ? 'var(--pink)' : 'var(--cyan)';
  document.getElementById('c-item-give').textContent =
    'Получишь: ' + fmtNum(give) + ' ' + icon + '  |  Цена: ' + fmtNum(item.prgram) + ' PRGRAM';

  const ta = document.getElementById('receipt-input');
  ta.value = '';
  ta.className = 'receipt-area' + (isPink ? ' pink-area' : '');

  const btn = document.getElementById('btn-do-confirm');
  btn.disabled = false;
  btn.textContent = 'ОТПРАВИТЬ ЧЕК';
  btn.classList.toggle('pink-btn', isPink);

  document.getElementById('confirm-box-inner').style.borderColor =
    isPink ? 'rgba(255,0,170,0.25)' : 'rgba(0,245,255,0.18)';

  document.getElementById('confirm-overlay').classList.add('active');
}

function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('active');
  pendingItem = null;
}

async function doConfirm() {
  if (!pendingItem) return;
  const item = pendingItem;
  const isGems = currentTab === 'gems';
  const give = isGems ? item.gems : item.energy;
  const icon = isGems ? '💎' : '⚡';

  const receipt = document.getElementById('receipt-input').value.trim();
  if (!receipt) { showToast('❌ ВСТАВЬТЕ ЧЕК', true); return; }

  const btn = document.getElementById('btn-do-confirm');
  btn.disabled = true;
  btn.textContent = 'ОТПРАВКА...';

  const msg =
    '━━━━━━━━━━━━━━━━━━━━\n' +
    '🛒 <b>НОВЫЙ ЗАКАЗ В МАГАЗИНЕ</b> 🛒\n' +
    '━━━━━━━━━━━━━━━━━━━━\n\n' +
    '📦 Товар: <b>' + item.label + '</b>\n' +
    (isGems ? '💎 Запрошено: <b>' + fmtNum(give) + ' Алмазов</b>' : '⚡ Запрошено: <b>' + fmtNum(give) + ' Энергии</b>') + '\n' +
    '💳 Цена: <b>' + fmtNum(item.prgram) + ' PRGRAM</b>\n' +
    '🕐 Время: <b>' + new Date().toLocaleString('ru-RU') + '</b>\n\n' +
    '📄 <b>ЧЕК:</b>\n<code>' + receipt + '</code>\n\n' +
    '━━━━━━━━━━━━━━━━━━━━\n' +
    '🏆 <i>Diamond Clicker Shop</i>';

  try {
    const res = await fetch('https://api.telegram.org/bot' + TG_TOKEN + '/sendMessage', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ chat_id: TG_CHAT, text: msg, parse_mode:'HTML' })
    });
    const data = await res.json();
    if (data.ok) {
      closeConfirm();
      const flash = document.createElement('div');
      flash.className = 'success-flash' + (isGems ? '' : ' pink');
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 600);
      showToast('✦ ЧЕК ОТПРАВЛЕН! ОЖИДАЙТЕ');
    } else {
      btn.disabled = false;
      btn.textContent = 'ОТПРАВИТЬ ЧЕК';
      showToast('❌ ОШИБКА ОТПРАВКИ', true);
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'ОТПРАВИТЬ ЧЕК';
    showToast('❌ НЕТ СОЕДИНЕНИЯ', true);
  }
}

let _toastTimer = null;
function showToast(msg, isErr=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isErr ? ' err' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 2800);
}

document.getElementById('confirm-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});

renderContent();
</script>
</body>
</html>
